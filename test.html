<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Construction</title>
    <style>
        #facebook-link {
            display: flex;
            align-items: center;
            justify-content: center; /* Center the content horizontally */
            cursor: pointer;
        }

        #facebook-link img {
            margin-right: 10px; /* Adjust the spacing as needed */
        }

        #facebook-link div {
            display: flex;
            flex-direction: column; /* Arrange name and profile description vertically */
            align-items: flex-start; /* Align text to the left */
        }
    </style>
</head>
<body>
    <h1>Website Under Construction</h1>

    <p>This website is currently under development and not yet ready for public access.</p>

    <p>In the meantime, you can visit my Facebook profile for more information or to stay updated on the website's progress.</p>

    <div id="facebook-link" onclick="redirectToFacebook()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Facebook_f_logo_%282019%29.svg/1199px-Facebook_f_logo_%282019%29.svg.png" alt="Facebook Logo" width="50" height="50">
        <div>
            <h2>Mehrab Mahmud Udoy (Ferris)</h2>
            <p>My Facebook Profile</p>
        </div>
    </div>

    <button id="redirectToFacebook">Visit My Facebook Profile</button>

    <script>
        function redirectToFacebook() {
            // Redirect to your Facebook profile URL
            window.location.href = 'https://www.facebook.com/rimehrab';
        }
    </script>
</body>
</html>
